<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="iMSNP">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>iMSNP</title>
    <link rel="stylesheet" href="saurik.css?v=8779042159">
    
</head>
<body class="pinstripe">
    <!-- Login Screen -->
    <div id="loginScreen" class="screen">
        <div class="navbar">
            iMSNP
            <div class="nav-right">
                <button id="reloadBtn" class="btn-secondary">Reload</button>
            </div>
        </div>
        <div class="login-caption">Work-in-progress, bugs and issues may occur</div>
        <panel class="screen-panel">
            <form id="loginForm" onsubmit="return false;">
                <div class="login-credentials">
                    <div class="login-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder="example@hotmail.com">
                    </div>
                    <div class="login-row">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Required">
                    </div>
                    <div class="login-row">
                        <label for="service">Service</label>
                        <select id="service" name="service" required>
                            <option value="crosstalk">CrossTalk</option>
                            <option value="crosstalk_nodispatch">CrossTalk (alt)</option>
                            <option value="legacy">Legacy MSN</option>
                            <option value="custom">Custom...</option>
                        </select>
                    </div>
                    <div class="login-row switch-row">
                        <label for="forceHttp">Force HTTP</label>
                        <input type="checkbox" id="forceHttp" name="forceHttp" class="row-switch">
                    </div>
                    <div class="login-row custom-service-row" id="customServerRow" style="display:none;">
                        <label for="server">Main Server</label>
                        <input type="text" id="server" name="server" placeholder="Required">
                    </div>
                    <div class="login-row custom-service-row" id="customPortRow" style="display:none;">
                        <label for="port">Port</label>
                        <input type="tel" id="port" name="port" placeholder="1863" value="1863" maxlength="5" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
                    </div>
                    <div class="login-row custom-service-row" id="customNexusRow" style="display:none;">
                        <label for="nexus">Nexus</label>
                        <input type="text" id="nexus" name="nexus" placeholder="Required">
                    </div>
                    <div class="login-row custom-service-row" id="customConfigRow" style="display:none;">
                        <label for="config">Config</label>
                        <input type="text" id="config" name="config" placeholder="Optional">
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary">Sign In</button>
                <div class="message-strip">
                    <div id="loginError" class="error-message" style="display:none;"></div>
                    <div id="loginStatus" class="status-message" style="display:none;"></div>
                </div>
                <div class="login-caption">iMSNP connects you with your MSN Messenger contacts, on the web, on the go!</div>
            </form>
        </panel>
    </div>

    <!-- Main Screen -->
    <div id="mainScreen" class="screen" style="display:none;">
        <div class="navbar">
            <div class="nav-left">
                <select id="statusSelect" class="status-select">
                    <option value="Online">Online</option>
                    <option value="Busy">Busy</option>
                    <option value="Away">Away</option>
                    <option value="BeRightBack">Be Right Back</option>
                    <option value="OnThePhone">On The Phone</option>
                    <option value="OutToLunch">Out To Lunch</option>
                    <option value="Idle">Idle</option>
                    <option value="Invisible">Invisible</option>
                </select>
            </div>
            Contacts
            <div class="nav-right">
                <button id="logoutBtn" class="btn-secondary">Sign Out</button>
            </div>
        </div>
        <panel class="screen-panel content">
            <div class="collapsible-sections">
                <div class="collapsible-section">
                    <button class="collapsible-toggle" id="togglePsm">Personal Message ▼</button>
                    <div class="collapsible-content" id="psmSection" style="display:none;">
                        <input type="text" id="personalMessageInput" placeholder="Set personal message..." maxlength="48">
                        <button id="setPsmBtn" class="btn-small">Set</button>
                    </div>
                </div>
                <div class="collapsible-section">
                    <button class="collapsible-toggle" id="toggleAddContact">Add Contact ▼</button>
                    <div class="collapsible-content" id="addContactSection" style="display:none;">
                        <input type="email" id="addContactInput" placeholder="Add contact email...">
                        <button id="addContactBtn" class="btn-small">Add</button>
                    </div>
                </div>
            </div>
            <div id="contactList" class="contact-list"></div>
        </panel>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="screen" style="display:none;">
        <div class="navbar">
            <div class="nav-left">
                <button id="nudgeBtn" class="btn-small">Nudge</button>
            </div>
            <span id="chatTitle">Chat</span>
            <div class="nav-right">
                <button id="closeChatBtn" class="btn-secondary">Close</button>
            </div>
        </div>
        <panel class="screen-panel content chat-layout">
            <div id="messageContainer" class="message-container"></div>
            <div class="message-input-container">
                <input type="text" id="messageInput" placeholder="Text Message" maxlength="512">
            </div>
        </panel>
    </div>

    <script src="/app.js?v=8779042159"></script>
    <script>
        var userAgent = window.navigator && window.navigator.userAgent ? window.navigator.userAgent : '';
        if ( /(iPhone|iPad|iPod)/.test(userAgent) && /OS [1-5]_/.test(userAgent) && /Safari/.test(userAgent) ) {
            alert("iMSNP requires iOS 6 or later. Please update your device to use this application.");
            document.getElementById('loginBtn').disabled = true;
            document.getElementById("loginBtn").textContent = "Unavailable";
            document.getElementById('loginError').textContent = "DeviceUnsupported: iOS 6 or later is required.";
            document.getElementById('loginError').style.display = 'block'; 

            // Wait until page is loaded before removing login-ready class from loginBtn
            window.addEventListener('load', function() {
                document.getElementById('loginBtn').classList.remove('login-ready');
            });

        }
    </script>
</body>
</html>
